name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install

      - name: Build web frontend
        working-directory: web
        run: pnpm exec vite build

      - name: Download WebView2 SDK
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory webview2_tmp
          $pkg = Get-ChildItem -Path webview2_tmp -Filter "Microsoft.Web.WebView2.*" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path WebView2 | Out-Null
          Copy-Item -Recurse "$($pkg.FullName)\*" "WebView2\"

      - name: Configure CMake
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/minispot.exe
          generate_release_notes: true
